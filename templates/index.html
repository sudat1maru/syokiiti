<!DOCTYPE html>
<html>
<head>
    <title>初期位置判別ツール(仮)</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
            width: 380px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            background: #2196F3;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1976D2;
        }

        #preview {
            margin-top: 15px;
        }

        #preview img {
            width: 100%;
            border-radius: 8px;
        }

        #result {
            margin-top: 20px;
        }

        .item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: #f0f0f0;
        }

        .label {
            font-weight: bold;
        }

        .index {
            font-size: 18px;
            color: #e91e63;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>初期位置判別ツール(仮)</h2>

    <input type="file" id="image" onchange="previewImage()">
    <br>
    <button onclick="upload()">解析する</button>

    <div id="preview"></div>

    <div id="result"></div>
</div>

<script>
function previewImage() {
    const file = document.getElementById("image").files[0];
    const preview = document.getElementById("preview");

    if (file) {
        const url = URL.createObjectURL(file);
        preview.innerHTML = `<img src="${url}">`;
    }
}

function upload() {
    const file = document.getElementById("image").files[0];

    if (!file) {
        alert("画像を選択してね");
        return;
    }

    const formData = new FormData();
    formData.append("image", file);

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        displayResult(data);
    });
}

function displayResult(data) {
    let html = "";

    const order = ["1st", "2nd", "3rd", "4th"];

    order.forEach(label => {
        if (data[label]) {
            let item = data[label];

            if (item.index !== null) {
                html += `
                    <div class="item">
                        <div class="label">${label}</div>
                        <div class="index">番号: ${item.index}</div>
                        <div>Y: ${item.y}</div>
                    </div>
                `;
            } else {
                html += `
                    <div class="item error">
                        ${label} → 範囲外
                    </div>
                `;
            }
        }
    });

    document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
